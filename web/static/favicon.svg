<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background panel -->
  <rect x="1" y="4" width="30" height="24" rx="3" fill="#0f0f14" stroke="#f5a623" stroke-width="1.5"/>
  <!-- Peaked top fin -->
  <polygon points="11,4 16,0 21,4" fill="#f5a623"/>
  <!-- Corner bulbs -->
  <circle cx="5"  cy="8"  r="1.5" fill="#f5a623"/>
  <circle cx="27" cy="8"  r="1.5" fill="#f5a623"/>
  <circle cx="5"  cy="24" r="1.5" fill="#f5a623"/>
  <circle cx="27" cy="24" r="1.5" fill="#f5a623"/>
  <!-- Top/bottom edge bulbs -->
  <circle cx="12" cy="6"  r="1.2" fill="#f5a623"/>
  <circle cx="16" cy="6"  r="1.2" fill="#f5a623"/>
  <circle cx="20" cy="6"  r="1.2" fill="#f5a623"/>
  <circle cx="12" cy="26" r="1.2" fill="#f5a623"/>
  <circle cx="16" cy="26" r="1.2" fill="#f5a623"/>
  <circle cx="20" cy="26" r="1.2" fill="#f5a623"/>
  <!-- Side bulbs -->
  <circle cx="3" cy="14" r="1.2" fill="#f5a623"/>
  <circle cx="3" cy="18" r="1.2" fill="#f5a623"/>
  <circle cx="29" cy="14" r="1.2" fill="#f5a623"/>
  <circle cx="29" cy="18" r="1.2" fill="#f5a623"/>
  <!-- M letterform -->
  <text x="16" y="21" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-weight="900" font-size="14" fill="#f5a623">M</text>
</svg>
