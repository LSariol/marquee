{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{.CSRFToken}}">
  <title>{{block "title" .}}Marquee{{end}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
  <script>
    document.addEventListener('htmx:configRequest', function(e) {
      var t = document.querySelector('meta[name="csrf-token"]');
      if (t) e.detail.headers['X-CSRF-Token'] = t.content;
    });
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.nav-links a').forEach(function(a) {
        if (a.pathname === location.pathname) a.classList.add('active');
      });
    });
  </script>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1" y="4" width="30" height="24" rx="3" fill="#0f0f14" stroke="#f5a623" stroke-width="1.5"/>
        <polygon points="11,4 16,0 21,4" fill="#f5a623"/>
        <circle cx="5"  cy="8"  r="1.5" fill="#f5a623"/>
        <circle cx="27" cy="8"  r="1.5" fill="#f5a623"/>
        <circle cx="5"  cy="24" r="1.5" fill="#f5a623"/>
        <circle cx="27" cy="24" r="1.5" fill="#f5a623"/>
        <circle cx="12" cy="6"  r="1.2" fill="#f5a623"/>
        <circle cx="16" cy="6"  r="1.2" fill="#f5a623"/>
        <circle cx="20" cy="6"  r="1.2" fill="#f5a623"/>
        <circle cx="12" cy="26" r="1.2" fill="#f5a623"/>
        <circle cx="16" cy="26" r="1.2" fill="#f5a623"/>
        <circle cx="20" cy="26" r="1.2" fill="#f5a623"/>
        <circle cx="3" cy="14" r="1.2" fill="#f5a623"/>
        <circle cx="3" cy="18" r="1.2" fill="#f5a623"/>
        <circle cx="29" cy="14" r="1.2" fill="#f5a623"/>
        <circle cx="29" cy="18" r="1.2" fill="#f5a623"/>
        <text x="16" y="21" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-weight="900" font-size="14" fill="#f5a623">M</text>
      </svg>
      MARQUEE
    </a>
    <div class="nav-links">
      <a href="/">Pool</a>
      <a href="/calendar">Calendar</a>
      <a href="/legacy">Watched</a>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-user">
      {{if .User}}
        {{if .User.AvatarURL}}<img src="{{.User.AvatarURL}}" class="nav-avatar" alt="{{.User.DisplayName}}">{{end}}
        <a href="/me">{{.User.DisplayName}}</a>
        {{if .User.IsOwner}}<a href="/admin">Admin</a>{{end}}
        <form method="POST" action="/auth/logout" style="display:contents">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
          <button type="submit" class="btn-ghost btn-sm">Log out</button>
        </form>
      {{else}}
        <a href="/auth/login" class="btn-primary btn-sm">Log in with Twitch</a>
      {{end}}
    </div>
  </nav>
  <main>
    {{block "content" .}}{{end}}
  </main>
  <footer>
    <small>Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a> &middot; &copy; 2026 Marquee</small>
  </footer>
</body>
</html>
{{end}}
