{{define "title"}}Suggest a Movie — Marquee{{end}}

{{define "content"}}
<div class="page-header">
  <h1>Suggest a Movie</h1>
</div>
<p class="text-muted" style="margin-bottom:1.25rem">Search for a movie below. Selecting one will add it to the pool.</p>

<div style="position:relative;max-width:560px">
  <input
    type="search"
    name="q"
    placeholder="Search TMDB…"
    autofocus
    class="search-input"
    hx-get="/suggest/search"
    hx-target="#search-results"
    hx-trigger="input delay:400ms, search"
    hx-indicator="#search-spinner"
  >
  <div id="search-spinner" class="searching-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<div id="search-results" style="margin-top:1.25rem"></div>
{{end}}
