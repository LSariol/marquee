{{if not .Results}}
<p class="text-muted">No results found. Try a different title.</p>
{{else}}
<div class="pool-list">
  {{range .Results}}
  <div class="movie-card">

    <div class="card-poster">
      {{if .PosterURL}}
      <img src="{{.PosterURL}}" alt="{{.Title}} poster">
      {{else}}
      <div class="poster-placeholder">🎬</div>
      {{end}}
    </div>

    <div class="card-info">
      <div class="card-title-row">
        <span class="card-title">{{.Title}}</span>
        {{if .ReleaseYear}}<span class="card-year">· {{.ReleaseYear}}</span>{{end}}
      </div>
    </div>

    <div class="card-actions" style="margin-left:auto">
      <form method="POST" action="/movies" style="display:contents">
        <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
        <input type="hidden" name="tmdb_id" value="{{.ID}}">
        <button type="submit" class="btn-primary btn-sm">+ Suggest</button>
      </form>
    </div>

  </div>
  {{end}}
</div>
{{end}}
