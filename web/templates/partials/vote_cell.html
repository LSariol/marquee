{{$m := .Movie}}
<form hx-post="/movies/{{$m.ID}}/vote" hx-target="#vote-{{$m.ID}}" hx-swap="innerHTML" style="display:contents">
  <input type="hidden" name="value" value="1">
  <button type="submit" class="btn-vote up{{if eq $m.UserVote 1}} active{{end}}">▲</button>
</form>
<span class="vote-count">{{$m.NetVotes}}</span>
<form hx-post="/movies/{{$m.ID}}/vote" hx-target="#vote-{{$m.ID}}" hx-swap="innerHTML" style="display:contents">
  <input type="hidden" name="value" value="-1">
  <button type="submit" class="btn-vote down{{if eq $m.UserVote -1}} active{{end}}">▼</button>
</form>
