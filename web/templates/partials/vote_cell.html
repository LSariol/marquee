{{$m := .Movie}}
<form hx-post="/movies/{{$m.ID}}/vote"
      hx-target="#vote-{{$m.ID}}"
      hx-swap="innerHTML"
      style="display:inline">
  <input type="hidden" name="value" value="1">
  <button type="submit"{{if eq $m.UserVote 1}} style="font-weight:bold"{{end}}>▲</button>
</form>
<span>{{$m.NetVotes}}</span>
<form hx-post="/movies/{{$m.ID}}/vote"
      hx-target="#vote-{{$m.ID}}"
      hx-swap="innerHTML"
      style="display:inline">
  <input type="hidden" name="value" value="-1">
  <button type="submit"{{if eq $m.UserVote -1}} style="font-weight:bold"{{end}}>▼</button>
</form>
